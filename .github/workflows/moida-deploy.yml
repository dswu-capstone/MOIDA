name: MOIDA Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 코드를 가져옵니다
        uses: actions/checkout@v3

      - name: 2. Java JDK 17을 설정합니다
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. MOIDA Spring Boot 빌드
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: 4. Docker Hub 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 5. MOIDA 도커 이미지 빌드 및 푸시
        run: |
          # Spring 이미지 빌드 및 푸시 (경로를 점 '.' 하나로 변경했습니다)
          docker build -t ${{ secrets.DOCKER_USERNAME }}/moida-spring:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/moida-spring:latest
          
          # FastAPI 이미지 빌드 및 푸시 (경로를 실제 AI 폴더명인 './ai-server'로 변경했습니다)
          docker build -t ${{ secrets.DOCKER_USERNAME }}/moida-ai:latest ./ai-server
          docker push ${{ secrets.DOCKER_USERNAME }}/moida-ai:latest

      - name: 6. EC2에 배포 및 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 서버에 도커 컴포즈 파일 생성 (모든 환경변수 주입!)
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              moida-spring:
                container_name: moida-spring-container
                image: ${{ secrets.DOCKER_USERNAME }}/moida-spring:latest
                ports:
                  - "8080:8080"
                environment:
                  - SPRING_DATA_MONGODB_URI=${{ secrets.MONGO_URI }}
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                  - JWT_ACCESS_EXPIRATION=${{ secrets.JWT_ACCESS_EXPIRATION }}
                  - JWT_REFRESH_EXPIRATION=${{ secrets.JWT_REFRESH_EXPIRATION }}
                restart: always
            
              moida-ai:
                container_name: moida-ai-container
                image: ${{ secrets.DOCKER_USERNAME }}/moida-ai:latest
                ports:
                  - "8000:8000"
                environment:
                  - OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
                  - OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}
                  - OPENAI_EMBEDDING_MODEL=${{ secrets.OPENAI_EMBEDDING_MODEL }}
                restart: always
            EOF
            
            # 기존 컨테이너 종료 및 최신 이미지 실행
            docker-compose pull
            docker-compose down
            docker-compose up -d
            #