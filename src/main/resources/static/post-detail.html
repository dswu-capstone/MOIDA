<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOIDA - 게시글 상세</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/post-detail.css" />
</head>
<body>

<header class="app-header">
    <div class="header-container">
        <a href="post.html" class="header-logo">MOIDA</a>
        <div class="header-search">
            <input type="text" placeholder="검색어를 입력하세요" />
            <button type="button" class="btn-search" id="searchBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
        <div class="header-profile">
            <div class="profile-avatar">👤</div>
            <span>내 프로필</span>
        </div>
    </div>
</header>

<main class="container detail-container">

    <div class="top-actions">
        <button class="btn-back" onclick="location.href='post.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            뒤로가기
        </button>
    </div>

    <article class="post-content-wrap">

        <div class="detail-header">
            <span class="detail-badge" id="detailBadge">스터디</span>
            <h1 class="detail-title" id="detailTitle">로딩 중...</h1>
        </div>

        <div class="ai-analysis-box">
            <div class="ai-box-title">✨ AI 분석 태그</div>
            <div class="ai-tags" id="detailTags"></div>
        </div>

        <div class="detail-meta">
            <div class="meta-author">
                <div class="author-avatar">👤</div>
                <span class="author-name" id="detailWriter">작성자: -</span>
            </div>
            <span class="meta-date" id="detailDate">-</span>
        </div>

        <hr class="divider" />

        <div class="detail-body" id="detailBody">
            로딩 중...
        </div>

        <hr class="divider" />

        <div class="detail-footer">
            <button class="btn-primary btn-apply" id="applyBtn" onclick="applyPost()">참여 신청하기</button>
        </div>
        <div class="open-chat-box" id="openChatBox" style="display:none;">
            <p class="open-chat-label">📎 오픈채팅방 링크</p>
            <a class="open-chat-link" id="openChatLink" href="#" target="_blank"></a>
        </div>

    </article>

</main>
<script src="js/post-deatil.js"></script>
</body>
</html>
