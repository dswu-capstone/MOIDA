<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOIDA - 게시글 상세</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/post-detail.css" />
</head>
<body>

<header class="app-header">
    <div class="header-container">
        <a href="post.html" class="header-logo">MOIDA</a>
        <div class="header-search">
            <input type="text" placeholder="검색어를 입력하세요" />
        </div>
        <div class="header-profile">
            <div class="profile-avatar">👤</div>
            <span>내 프로필</span>
        </div>
    </div>
</header>

<main class="container detail-container">

    <div class="top-actions">
        <button class="btn-back" onclick="location.href='post.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            뒤로가기
        </button>
    </div>

    <article class="post-content-wrap">

        <div class="detail-header">
            <span class="detail-badge" id="detailBadge">스터디</span>
            <h1 class="detail-title" id="detailTitle">로딩 중...</h1>
        </div>

        <div class="ai-analysis-box">
            <div class="ai-box-title">✨ AI 분석 태그</div>
            <div class="ai-tags" id="detailTags"></div>
        </div>

        <div class="detail-meta">
            <div class="meta-author">
                <div class="author-avatar">👤</div>
                <span class="author-name" id="detailWriter">작성자: -</span>
            </div>
            <span class="meta-date" id="detailDate">-</span>
        </div>

        <hr class="divider" />

        <div class="detail-body" id="detailBody">
            로딩 중...
        </div>

        <hr class="divider" />

        <div class="detail-footer">
            <button class="btn-primary btn-apply">참여 신청하기</button>
        </div>

    </article>

</main>

<script>
    const API_BASE = 'http://localhost:8080';

    // URL에서 게시글 id 추출
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('id');

    async function loadPostDetail() {
        if (!postId) {
            alert('게시글 ID가 없습니다.');
            location.href = 'post.html';
            return;
        }

        try {
            const token = localStorage.getItem('accessToken');
            const res = await fetch(`${API_BASE}/api/boards/${postId}`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!res.ok) throw new Error('조회 실패');
            const data = await res.json();

            // 배지
            const badge = document.getElementById('detailBadge');
            badge.textContent = data.boardType === 'study' ? '스터디' : '이벤트';
            badge.className = `detail-badge ${data.boardType === 'study' ? 'badge-study' : 'badge-event'}`;

            // 제목
            document.getElementById('detailTitle').textContent = data.title;

            // 태그
            const tagsEl = document.getElementById('detailTags');
            tagsEl.innerHTML = (data.tags || []).map(tag => `<span>#${tag}</span>`).join('');

            // 작성자
            document.getElementById('detailWriter').textContent = `작성자: ${data.writer || '알 수 없음'}`;

            // 날짜
            if (data.createdAt) {
                const date = new Date(data.createdAt);
                document.getElementById('detailDate').textContent =
                    `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
            }

            // 본문
            document.getElementById('detailBody').textContent = data.body;

            // 페이지 타이틀
            document.title = `MOIDA - ${data.title}`;

        } catch (err) {
            console.error('게시글 상세 조회 오류:', err);
            document.getElementById('detailTitle').textContent = '게시글을 불러올 수 없습니다.';
            document.getElementById('detailBody').textContent = '다시 시도해주세요.';
        }
    }

    loadPostDetail();
</script>

</body>
</html>
