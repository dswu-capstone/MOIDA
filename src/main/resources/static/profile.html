<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOIDA - 프로필 설정</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/profile.css" />
</head>
<body>

<header class="app-header">
  <div class="header-container">
    <a href="post.html" class="header-logo">MOIDA</a>
    <div style="width: 80px;"></div>
  </div>
</header>

<main class="container">
  <div class="profile-wrap">
    <form class="profile-form" onsubmit="return false;">

      <div class="profile-section">
        <label class="profile-label">닉네임</label>
        <div class="profile-nickname" id="nicknameDisplay"></div>
      </div>

      <div class="profile-section">
        <label class="profile-label" for="major">전공</label>
        <input class="profile-input" id="major" type="text" placeholder="전공을 입력하세요" />
      </div>

      <div class="profile-section">
        <label class="profile-label">관심 분야 <span class="label-hint">(최대 2개 선택)</span></label>
        <div class="tag-select" id="interestTags">
          <label class="tag-option"><input type="checkbox" name="interest" value="개발/IT" /><span>#개발/IT</span></label>
          <label class="tag-option"><input type="checkbox" name="interest" value="디자인" /><span>#디자인</span></label>
          <label class="tag-option"><input type="checkbox" name="interest" value="경영/마케팅" /><span>#경영/마케팅</span></label>
          <label class="tag-option"><input type="checkbox" name="interest" value="자격증" /><span>#자격증</span></label>
          <label class="tag-option"><input type="checkbox" name="interest" value="취업/진로" /><span>#취업/진로</span></label>
        </div>
      </div>

      <div class="profile-section">
        <label class="profile-label" for="goal">나의 목표</label>
        <input class="profile-input" id="goal" type="text" placeholder="예: 상반기 내 코딩테스트 합격!" />
      </div>

      <div class="profile-section">
        <label class="profile-label">가능 시간</label>
        <div class="days-wrap">
          <label class="day-option"><input type="checkbox" name="day" value="월" /><span>월</span></label>
          <label class="day-option"><input type="checkbox" name="day" value="화" /><span>화</span></label>
          <label class="day-option"><input type="checkbox" name="day" value="수" /><span>수</span></label>
          <label class="day-option"><input type="checkbox" name="day" value="목" /><span>목</span></label>
          <label class="day-option"><input type="checkbox" name="day" value="금" /><span>금</span></label>
          <label class="day-option"><input type="checkbox" name="day" value="토" /><span>토</span></label>
          <label class="day-option"><input type="checkbox" name="day" value="일" /><span>일</span></label>
        </div>
        <div class="time-wrap">
          <label class="time-option"><input type="checkbox" name="time" value="오전" /><span>오전</span></label>
          <label class="time-option"><input type="checkbox" name="time" value="오후" /><span>오후</span></label>
          <label class="time-option"><input type="checkbox" name="time" value="저녁" /><span>저녁</span></label>
        </div>
      </div>

      <div class="profile-section">
        <label class="profile-label" for="introduce">한 줄 자기소개</label>
        <textarea class="profile-input profile-textarea" id="introduce" placeholder="간단한 자기소개를 입력해주세요."></textarea>
      </div>

      <div class="profile-section">
        <label class="profile-label">수준</label>
        <div class="radio-wrap">
          <label class="radio-option"><input type="radio" name="level" value="초급" /><span>초급</span></label>
          <label class="radio-option"><input type="radio" name="level" value="중급" /><span>중급</span></label>
          <label class="radio-option"><input type="radio" name="level" value="고급" /><span>고급</span></label>
        </div>
      </div>

      <div class="profile-section">
        <label class="profile-label">선호 모임 형태</label>
        <div class="radio-wrap">
          <label class="radio-option"><input type="radio" name="locationType" value="오프라인" /><span>오프라인</span></label>
          <label class="radio-option"><input type="radio" name="locationType" value="온라인" /><span>온라인</span></label>
        </div>
      </div>

      <div class="profile-section">
        <label class="profile-label">선호 지역 <span class="label-hint">(클릭하여 전체 보기)</span></label>
        <div class="region-wrap collapsed" id="regionWrap">
          <label class="tag-option"><input type="radio" name="region" value="강남" /><span>#강남</span></label>
          <label class="tag-option"><input type="radio" name="region" value="홍대" /><span>#홍대</span></label>
          <label class="tag-option"><input type="radio" name="region" value="신촌" /><span>#신촌</span></label>
          <label class="tag-option"><input type="radio" name="region" value="건대" /><span>#건대</span></label>
          <label class="tag-option"><input type="radio" name="region" value="잠실" /><span>#잠실</span></label>
          <label class="tag-option"><input type="radio" name="region" value="여의도" /><span>#여의도</span></label>
          <label class="tag-option"><input type="radio" name="region" value="종로" /><span>#종로</span></label>
          <label class="tag-option"><input type="radio" name="region" value="을지로" /><span>#을지로</span></label>
          <label class="tag-option"><input type="radio" name="region" value="성수" /><span>#성수</span></label>
          <label class="tag-option"><input type="radio" name="region" value="이태원" /><span>#이태원</span></label>
          <label class="tag-option"><input type="radio" name="region" value="압구정" /><span>#압구정</span></label>
          <label class="tag-option"><input type="radio" name="region" value="청담" /><span>#청담</span></label>
          <label class="tag-option"><input type="radio" name="region" value="판교" /><span>#판교</span></label>
          <label class="tag-option"><input type="radio" name="region" value="분당" /><span>#분당</span></label>
          <label class="tag-option"><input type="radio" name="region" value="수원" /><span>#수원</span></label>
          <label class="tag-option"><input type="radio" name="region" value="인천" /><span>#인천</span></label>
          <label class="tag-option"><input type="radio" name="region" value="부천" /><span>#부천</span></label>
          <label class="tag-option"><input type="radio" name="region" value="일산" /><span>#일산</span></label>
          <label class="tag-option"><input type="radio" name="region" value="강북" /><span>#강북</span></label>
          <label class="tag-option"><input type="radio" name="region" value="강서" /><span>#강서</span></label>
        </div>
        <button type="button" class="region-toggle" id="regionToggle" onclick="toggleRegion()">▼ 전체 보기</button>
      </div>

      <div class="profile-footer">
        <button class="btn-primary profile-save-btn" type="button" onclick="saveProfile()">저장하기</button>
      </div>

    </form>
  </div>
</main>

<!-- api.js 먼저, profile.js 나중에 -->
<script src="js/api.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
