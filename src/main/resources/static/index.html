<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOIDA - 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<div class="auth-bg">
  <div class="auth-card">

    <div class="auth-logo">MOIDA</div>
    <p class="auth-sub">스터디 · 이벤트 매칭 플랫폼</p>

    <div class="auth-form">
      <div class="field">
        <label class="field-label" for="username">아이디</label>
        <input class="field-input" id="username" type="text" placeholder="아이디를 입력하세요" />
      </div>

      <div class="field">
        <label class="field-label" for="password">비밀번호</label>
        <input class="field-input" id="password" type="password" placeholder="비밀번호를 입력하세요" />
      </div>

      <button class="btn-primary" type="button">로그인</button>
    </div>

    <hr class="auth-divider" />

    <p class="auth-footer">
      아직 회원이 아니신가요? <a href="signup.html">회원가입</a>
    </p>

  </div>
</div>

</body>
</html>
