<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOIDA - 게시글 목록</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/post.css" />
</head>
<body>

<header class="app-header">
    <div class="header-container">
        <a href="post.html" class="header-logo">MOIDA</a>

        <div class="header-search">
            <input type="text" placeholder="검색어를 입력하세요" />
            <button type="button" class="btn-search" id="searchBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>

        <a href="profile.html" class="header-profile">
            <div class="profile-avatar">👤</div>
            <span>내 프로필</span>
        </a>
    </div>
</header>
<main class="container">
    <nav class="post-tabs">
        <div class="tab-group">
            <button class="tab active" data-type="total">전체</button>
            <button class="tab" data-type="study">스터디</button>
            <button class="tab" data-type="event">이벤트</button>
        </div>
        <button class="tab-ai">✨ AI로 게시글 추천받기</button>
    </nav>

    <div class="category-tags">
        <button class="tag active" data-cat="">전체</button>
        <button class="tag" data-cat="개발/IT">#개발/IT</button>
        <button class="tag" data-cat="디자인">#디자인</button>
        <button class="tag" data-cat="경영/마케팅">#경영/마케팅</button>
        <button class="tag" data-cat="자격증">#자격증</button>
        <button class="tag" data-cat="취업/진로">#취업/진로</button>
        <button class="tag" data-cat="어학">#어학</button>
    </div>

    <!-- 게시글 카드 (JS로 동적 생성) -->
    <div class="post-grid" id="postGrid"></div>

    <!-- 빈 상태 -->
    <div class="empty-state" id="emptyState" style="display:none;">
        검색 결과가 없습니다.
    </div>

    <div class="post-footer">
        <div class="pagination">
            <button class="page-btn" id="prevBtn" disabled>&lt;</button>
            <span class="page-info" id="pageInfo">1 / 1</span>
            <button class="page-btn" id="nextBtn" disabled>&gt;</button>
        </div>
        <button class="btn-primary write-btn" onclick="location.href='post-write.html'">게시글 등록하기</button>
    </div>
</main>
<script src="js/post.js"></script>
</body>
</html>
