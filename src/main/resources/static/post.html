<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOIDA - 게시글 목록</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/post.css" />
</head>
<body>

<header class="app-header">
    <div class="header-container">
        <a href="post.html" class="header-logo">MOIDA</a>

        <div class="header-search">
            <input type="text" placeholder="검색어를 입력하세요" />
        </div>

        <div class="header-profile">
            <div class="profile-avatar">👤</div>
            <span>내 프로필</span>
        </div>
    </div>
</header>

<main class="container">
    <nav class="post-tabs">
        <div class="tab-group">
            <button class="tab active">전체</button>
            <button class="tab">스터디</button>
            <button class="tab">이벤트</button>
        </div>
        <button class="tab-ai">✨ AI로 게시글 추천받기</button>
    </nav>

    <div class="category-tags">
        <button class="tag active">#개발/IT</button>
        <button class="tag">#디자인</button>
        <button class="tag">#경영/마케팅</button>
        <button class="tag">#자격증</button>
        <button class="tag">#취업/진로</button>
        <button class="tag">#어학</button>
    </div>

    <div class="post-grid">
        <article class="post-card" onclick="location.href='post-detail.html'">
            <div class="card-badge badge-study">스터디</div>
            <h3 class="card-title">파이썬 기초 스터디원 모집합니다!</h3>
            <div class="card-tags">
                <span>#주말오후</span>
                <span>#개발/IT</span>
            </div>
        </article>

        <article class="post-card" onclick="location.href='post-detail.html'">
            <div class="card-badge badge-event">이벤트</div>
            <h3 class="card-title">2026 대학생 연합 해커톤 모집</h3>
            <div class="card-tags">
                <span>#IT/개발</span>
                <span>#무박2일</span>
            </div>
        </article>

        <article class="post-card" onclick="location.href='post-detail.html'">
            <div class="card-badge badge-study">스터디</div>
            <h3 class="card-title">SQLD 자격증 한 달 완성 같이해요</h3>
            <div class="card-tags">
                <span>#온라인</span>
                <span>#자격증</span>
            </div>
        </article>

        <article class="post-card" onclick="location.href='post-detail.html'">
            <div class="card-badge badge-study">스터디</div>
            <h3 class="card-title">리액트 프로젝트 사이드 프로젝트</h3>
            <div class="card-tags">
                <span>#프론트엔드</span>
                <span>#온라인</span>
            </div>
        </article>

        <article class="post-card" onclick="location.href='post-detail.html'">
            <div class="card-badge badge-event">이벤트</div>
            <h3 class="card-title">UX/UI 포트폴리오 리뷰 세미나</h3>
            <div class="card-tags">
                <span>#디자인</span>
                <span>#선착순</span>
            </div>
        </article>

        <article class="post-card" onclick="location.href='post-detail.html'">
            <div class="card-badge badge-study">스터디</div>
            <h3 class="card-title">토익 900점 목표 매일 인증 스터디</h3>
            <div class="card-tags">
                <span>#어학</span>
                <span>#아침기상</span>
            </div>
        </article>
    </div>

    <div class="post-footer">
        <div class="pagination">
            <button class="page-btn">&lt;</button>
            <span class="page-info">2 / 5</span>
            <button class="page-btn">&gt;</button>
        </div>
        <button class="btn-primary write-btn" onclick="location.href='post-write.html'">게시글 등록하기</button>
    </div>
</main>

</body>
</html>
